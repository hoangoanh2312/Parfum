name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  server:
    name: Server (lint + build + test)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint server
        run: npm run lint --workspace=server --if-present

      - name: Build server
        run: npm run build --workspace=server

      - name: Test server
        run: npm test --workspace=server --if-present

  client:
    name: Client (lint + build)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint client
        run: npm run lint --workspace=client

      - name: Build client
        run: npm run build --workspace=client
