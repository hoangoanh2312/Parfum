name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  server:
    name: Server - lint, typecheck, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm --workspace server run lint --if-present
      - run: npm --workspace server run typecheck --if-present
      - run: npm --workspace server run test --if-present
      - run: npm --workspace server run build

  client:
    name: Client - lint, typecheck, build, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm --workspace client run lint --if-present
      - run: npm --workspace client run typecheck --if-present
      - run: npm --workspace client run build
      - run: npm --workspace client run test --if-present

  docker:
    name: Build Docker images
    needs: [server, client]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build server image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          push: false
          tags: lessence-server:ci
      - name: Build client image
        uses: docker/build-push-action@v6
        with:
          context: ./client
          push: false
          tags: lessence-client:ci
          build-args: VITE_API_URL=/api
