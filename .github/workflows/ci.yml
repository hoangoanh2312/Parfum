name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  server:
    name: Server - lint, typecheck, test, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json
      # Dung npm ci khi da commit lockfile; fallback npm install neu chua co.
      - run: npm ci || npm install
      - run: npm run lint --if-present
      - run: npm run typecheck --if-present
      - run: npm test
      - run: npm run build

  client:
    name: Client - lint, typecheck, build, test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci || npm install
      - run: npm run lint --if-present
      - run: npm run typecheck --if-present
      - run: npm run build
      - run: npm test --if-present

  docker:
    name: Build Docker images
    needs: [server, client]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build server image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          push: false
          tags: lessence-server:ci
      - name: Build client image
        uses: docker/build-push-action@v6
        with:
          context: ./client
          push: false
          tags: lessence-client:ci
          build-args: VITE_API_URL=/api
