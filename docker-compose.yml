services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports: ["27017:27017"]
    volumes: ["mongo_data:/data/db"]
  server:
    build: ./server
    env_file: ./server/.env
    ports: ["5000:5000"]
    depends_on: [mongo]
  client:
    build: ./client
    ports: ["5173:80"]
    depends_on: [server]
volumes:
  mongo_data:
