# PF-44: chay toan bo stack (mongo + server + client) bang 1 lenh:
#   docker compose up --build
# Sau do mo trinh duyet: http://localhost:8080

services:
  mongo:
    image: mongo:7
    container_name: parfum-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  server:
    build: ./server
    container_name: parfum-server
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      NODE_ENV: production
      PORT: "5000"
      MONGO_URI: mongodb://mongo:27017/parfum-shop
      CLIENT_URL: ${CLIENT_URL:-http://localhost:8080}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-doi_secret_nay_khi_deploy_that}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-doi_refresh_secret_khi_deploy_that}
      VIETQR_BANK_BIN: ${VIETQR_BANK_BIN:-970415}
      VIETQR_ACCOUNT_NO: ${VIETQR_ACCOUNT_NO:-0000000000}
      VIETQR_ACCOUNT_NAME: ${VIETQR_ACCOUNT_NAME:-HOC PARFUM DEMO}
    ports:
      - "5000:5000"

  client:
    build: ./client
    container_name: parfum-client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "8080:80"

volumes:
  mongo-data:
