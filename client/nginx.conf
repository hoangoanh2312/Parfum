server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA: moi route deu tra ve index.html de React Router xu ly phia client
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache tai nguyen tinh co hash
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
