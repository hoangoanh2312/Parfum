# Render Blueprint (Infrastructure as Code). Import repo tren Render -> tu tao 2 web service Docker.
# Secret danh dau sync:false phai tu dien trong dashboard (KHONG commit gia tri that).
services:
  - type: web
    name: lessence-server
    runtime: docker
    dockerfilePath: ./server/Dockerfile
    dockerContext: ./server
    plan: starter
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: TRUST_PROXY
        value: 1
      - key: MONGO_URI
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CLIENT_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: CSRF_ENABLED
        value: "true"
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: SEPAY_WEBHOOK_SECRET
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: MAIL_FROM
        sync: false

  - type: web
    name: lessence-client
    runtime: docker
    dockerfilePath: ./client/Dockerfile
    dockerContext: ./client
    plan: starter
    envVars:
      - key: VITE_API_URL
        sync: false
